events {}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # Frontend - Manejo de rutas de React/Vue
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy para API de Ventas
        location /api/v1/ventas {
            # IMPORTANTE: Usamos el puerto 8080 que es el interno del contenedor
            proxy_pass http://backend-ventas:8080; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

       # Proxy para API de Despachos
        location /api/v1/despachos {
            # TIENE QUE SER 8081 (como dice tu log arriba)
            proxy_pass http://backend-despachos:8081; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}