name: CI/CD Tienda Perritos - Despliegue Unificado

on:
  push:
    branches:
      - master

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v3

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build y Push Frontend a ECR
        run: |
          docker build -t ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest .
          docker push ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest
        working-directory: ./proyecto semestral/front_despacho

      - name: Despliegue en EC2 Frontend via SSM
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_FRONTEND_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
              "docker pull ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest",
              "docker stop tienda-frontend || true",
              "docker rm tienda-frontend || true",
              "docker run -d --name tienda-frontend -p 80:80 ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest"
            ]'

  deploy-backend-ventas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v3

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build y Push Ventas a ECR
        run: |
          docker build -t ${{ secrets.ECR_REPO_URL_BACKEND }}:latest .
          docker push ${{ secrets.ECR_REPO_URL_BACKEND }}:latest
        working-directory: ./proyecto semestral/back-Ventas_SpringBoot/Springboot-API-REST

      - name: Despliegue en EC2 Backend Ventas via SSM
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_BACKEND_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
              "docker-compose -f /home/ec2-user/docker-compose.yml pull",
              "docker-compose -f /home/ec2-user/docker-compose.yml up -d"
            ]'

  deploy-backend-despachos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v3

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build y Push Despachos a ECR
        run: |
          docker build -t ${{ secrets.ECR_REPO_URL_BACKEND_DESPACHOS }}:latest .
          docker push ${{ secrets.ECR_REPO_URL_BACKEND_DESPACHOS }}:latest
        working-directory: "./proyecto semestral/back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO"

      - name: Despliegue en EC2 Backend Despachos via SSM
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_BACKEND_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
              "docker-compose -f /home/ec2-user/docker-compose.yml pull",
              "docker-compose -f /home/ec2-user/docker-compose.yml up -d"
            ]'